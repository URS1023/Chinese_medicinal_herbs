{% extends "base.html" %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header">
                    <h3 class="text-center">编辑药材</h3>
                </div>
                <div class="card-body">
                    <form method="POST" enctype="multipart/form-data">
                        <div class="mb-3">
                            <label for="name" class="form-label">药材名称</label>
                            <input type="text" class="form-control" id="name" name="name" value="{{ herb.name }}" required>
                        </div>
                        
                        <div class="mb-3">
                            <label for="image" class="form-label">药材图片</label>
                            {% if herb.image_path %}
                            <div class="mb-2">
                                <img src="{{ herb.image_path }}" alt="{{ herb.name }}" style="max-width: 200px;">
                            </div>
                            {% endif %}
                            <input type="file" class="form-control" id="image" name="image" accept="image/*">
                            <small class="text-muted">如果不选择新图片，将保持原有图片</small>
                        </div>
                        
                        <div class="mb-3">
                            <label for="description" class="form-label">药材描述</label>
                            <textarea class="form-control" id="description" name="description" rows="3" required>{{ herb.description }}</textarea>
                        </div>
                        
                        <div class="mb-3">
                            <label for="similar_herbs" class="form-label">相似药材</label>
                            <textarea class="form-control" id="similar_herbs" name="similar_herbs" rows="2">{{ herb.similar_herbs }}</textarea>
                        </div>
                        
                        <div class="mb-3">
                            <label for="effects" class="form-label">功效主治</label>
                            <textarea class="form-control" id="effects" name="effects" rows="3" required>{{ herb.effects }}</textarea>
                        </div>
                        
                        <div class="mb-3">
                            <label for="properties" class="form-label">性味</label>
                            <textarea class="form-control" id="properties" name="properties" rows="2" required>{{ herb.properties }}</textarea>
                        </div>
                        
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary">保存修改</button>
                            <a href="{{ url_for('admin_herbs') }}" class="btn btn-secondary">返回</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
